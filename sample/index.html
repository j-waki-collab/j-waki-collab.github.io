<!DOCTYPE html>
<html lang="ja">
<head>

  <title>サンプルページ</title>

    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;

      background: #0d1117; color: #e6edf3; text-align: center; padding: 24px;

    h1 { font-size: 26px; margin: 0 0 12px; }
    p { color: #9198a1; margin: 0 0 24px; }
    a { color: #2f81f7; text-decoration: none; }

</head>
<body>
  <div>
    <div class="badge">✅ 公開できてます</div>

    <a href="../">← ハブに戻る</a>

</html>
